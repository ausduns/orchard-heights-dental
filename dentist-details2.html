<script>
  (function () {
    const root = document.documentElement;

    // Light is default. Only go dark if user previously chose it.
    if (localStorage.getItem('theme') === 'dark') {
      root.classList.add('dark');
    }

    const btn = document.getElementById('theme-toggle');
    if (!btn) return;

    function syncIcons() {
      const dark = root.classList.contains('dark');
      const moon = btn.querySelector('.icon-moon');
      const sun  = btn.querySelector('.icon-sun');
      if (moon) moon.style.display = dark ? 'none' : 'flex';
      if (sun)  sun.style.display  = dark ? 'flex'  : 'none';
      btn.style.background  = dark ? 'rgba(20,20,32,0.95)'   : 'rgba(246,247,255,0.95)';
      btn.style.borderColor = dark ? 'rgba(112,112,255,0.3)' : 'rgba(64,65,209,0.25)';
      btn.style.color       = dark ? '#F0EFFF' : '#11081C';
    }

    syncIcons();

    btn.addEventListener('click', () => {
      root.classList.toggle('dark');
      localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
      syncIcons();
    });
  })();
</script>
